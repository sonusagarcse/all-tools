<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>BulkTools - Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-indigo-600 min-h-screen flex items-center justify-center p-6 text-white text-center">
    <div>
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center animate-bounce">
                <i data-lucide="wifi-off" class="w-12 h-12 text-white"></i>
            </div>
        </div>
        <h1 class="text-3xl font-black mb-4">No Internet Connection</h1>
        <p class="text-indigo-100 mb-8 max-w-xs mx-auto">
            This tool requires a connection for the first load. Once loaded, most tools work completely offline.
        </p>
        <button onclick="window.location.reload()" class="bg-white text-indigo-600 px-8 py-3 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-transform">
            Try Reconnecting
        </button>
        <p class="mt-8 text-xs text-indigo-200">
            Check your cellular data or Wi-Fi settings.
        </p>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
