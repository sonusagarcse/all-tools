<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>BulkTools — You're Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .brand { font-family: 'Space Grotesk', sans-serif; }

        body {
            background: #0f172a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
        }

        /* Animated background grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow blob */
        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulse-glow 4s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .signal-bar {
            display: inline-block;
            width: 6px;
            border-radius: 3px;
            background: #334155;
            animation: signal-fade 1.5s ease-in-out infinite;
        }
        .signal-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
        .signal-bar:nth-child(2) { height: 16px; animation-delay: 0.2s; }
        .signal-bar:nth-child(3) { height: 22px; animation-delay: 0.4s; }
        .signal-bar:nth-child(4) { height: 28px; animation-delay: 0.6s; }

        @keyframes signal-fade {
            0%, 100% { background: #334155; }
            50% { background: #64748b; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow"></div>

    <div class="relative z-10 flex flex-col items-center text-center max-w-sm w-full">

        <!-- Logo -->
        <div class="flex items-center gap-2 mb-10 opacity-60">
            <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i data-lucide="layers" class="w-4 h-4 text-white"></i>
            </div>
            <span class="brand text-white font-bold text-lg">BulkTools</span>
        </div>

        <!-- Signal bars animation -->
        <div class="flex items-end gap-1.5 mb-8 h-8">
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
        </div>

        <!-- WiFi off icon -->
        <div class="w-24 h-24 bg-slate-800/80 backdrop-blur-sm rounded-3xl flex items-center justify-center mb-6 border border-slate-700 shadow-2xl">
            <i data-lucide="wifi-off" class="w-12 h-12 text-slate-400"></i>
        </div>

        <h1 class="text-3xl font-black text-white mb-3 tracking-tight">You're Offline</h1>
        <p class="text-slate-400 text-sm leading-relaxed mb-2 max-w-xs">
            No internet connection. Check your Wi-Fi or mobile data, then tap retry.
        </p>
        <p class="text-slate-600 text-xs mb-8">
            Most tools work once you're connected for the first load.
        </p>

        <!-- Retry button -->
        <button
            onclick="tryReconnect()"
            id="retry-btn"
            class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-black rounded-2xl text-sm transition-all shadow-xl shadow-indigo-500/20 flex items-center justify-center gap-2 mb-3"
        >
            <i data-lucide="refresh-cw" class="w-4 h-4" id="retry-icon"></i>
            <span id="retry-label">Try Reconnecting</span>
        </button>

        <button
            onclick="window.location.href='index.html'"
            class="w-full py-3 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 font-bold rounded-2xl text-sm transition-all border border-slate-700 flex items-center justify-center gap-2"
        >
            <i data-lucide="home" class="w-4 h-4"></i>
            Go Home
        </button>

        <!-- Available offline tools -->
        <div class="mt-8 w-full bg-slate-900/60 rounded-2xl p-4 border border-slate-800 text-left">
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 text-center">Cached & Available Offline</p>
            <div class="grid grid-cols-2 gap-2">
                <a href="index.html#compressor" class="py-2.5 bg-emerald-900/20 border border-emerald-800/30 text-emerald-400 text-xs font-bold rounded-xl text-center active:scale-95 transition-transform">🗜️ Compressor</a>
                <a href="index.html#timer" class="py-2.5 bg-rose-900/20 border border-rose-800/30 text-rose-400 text-xs font-bold rounded-xl text-center active:scale-95 transition-transform">⏱️ Timer</a>
                <a href="index.html#qr-generator" class="py-2.5 bg-indigo-900/20 border border-indigo-800/30 text-indigo-400 text-xs font-bold rounded-xl text-center active:scale-95 transition-transform">📱 QR Code</a>
                <a href="index.html#text-editor" class="py-2.5 bg-blue-900/20 border border-blue-800/30 text-blue-400 text-xs font-bold rounded-xl text-center active:scale-95 transition-transform">📝 Text Editor</a>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        function tryReconnect() {
            const btn = document.getElementById('retry-btn');
            const label = document.getElementById('retry-label');
            const icon = document.getElementById('retry-icon');

            label.textContent = 'Checking…';
            btn.disabled = true;
            btn.classList.add('opacity-70');
            icon.classList.add('animate-spin');

            setTimeout(() => {
                if (navigator.onLine) {
                    label.textContent = 'Connected! Loading…';
                    window.location.href = 'index.html';
                } else {
                    label.textContent = 'Still Offline — Try Again';
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                    icon.classList.remove('animate-spin');
                }
            }, 1500);
        }

        // Auto-redirect when connection restored
        window.addEventListener('online', () => {
            setTimeout(() => { window.location.href = 'index.html'; }, 500);
        });
    </script>
</body>
</html>
