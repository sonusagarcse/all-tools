<div class="pb-6 animate-in slide-in-from-bottom-4 fade-in duration-300">
    <div class="mb-6 px-1">
        <h1 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">Settings</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 font-medium mt-1">Configure your app experience.</p>
    </div>

    <div class="space-y-6">
        <!-- Appearance Section -->
        <section>
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1">Appearance</h3>
            <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm overflow-hidden transition-colors">
                <div class="flex items-center justify-between p-4 border-b border-slate-50 dark:border-slate-800">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 flex items-center justify-center">
                            <i data-lucide="moon" class="w-4 h-4"></i>
                        </div>
                        <span class="text-sm font-bold text-slate-800 dark:text-slate-100">Dark Mode</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="dark-mode-toggle" class="sr-only peer" onchange="handleThemeToggle(this)">
                        <div class="w-11 h-6 bg-slate-200 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </label>
                </div>
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 flex items-center justify-center">
                            <i data-lucide="zap" class="w-4 h-4"></i>
                        </div>
                        <span class="text-sm font-bold text-slate-800 dark:text-slate-100">Reduce Motion</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </label>
                </div>
            </div>
        </section>

        <!-- Storage Section -->
        <section>
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1">Privacy & Storage</h3>
            <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm overflow-hidden transition-colors">
                <button onclick="clearAppCache()" class="w-full flex items-center justify-between p-4 border-b border-slate-50 dark:border-slate-800 active:bg-slate-50 dark:active:bg-slate-800 transition-colors text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-orange-50 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 flex items-center justify-center">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </div>
                        <span class="text-sm font-bold text-slate-800 dark:text-slate-100">Clear Offline Cache</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 dark:text-slate-600"></i>
                </button>
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 flex items-center justify-center">
                            <i data-lucide="info" class="w-4 h-4"></i>
                        </div>
                        <span class="text-sm font-bold text-slate-800 dark:text-slate-100">Version</span>
                    </div>
                    <span class="text-xs font-bold text-slate-400 dark:text-slate-500">1.0.5 PRO</span>
                </div>
            </div>
        </section>
    </div>

    <div class="mt-8 p-6 text-center">
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Powered by</p>
        <p class="text-sm font-black text-slate-400 dark:text-slate-600" style="font-family: 'Space Grotesk', sans-serif;">BulkTools Systems</p>
    </div>
</div>

<script>
    function initSettings() {
        const toggle = document.getElementById('dark-mode-toggle');
        if (toggle && window.appState) {
            toggle.checked = window.appState.theme === 'dark';
        }
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }

    function handleThemeToggle(el) {
        const theme = el.checked ? 'dark' : 'light';
        if (window.toggleGlobalTheme) {
            window.toggleGlobalTheme(theme);
        }
    }

    async function clearAppCache() {
        if(confirm('This will delete all offline files. Proceed?')) {
            const names = await caches.keys();
            await Promise.all(names.map(name => caches.delete(name)));
            alert('Cache cleared! App will reload to refresh assets.');
            window.location.reload();
        }
    }

    // Run init
    initSettings();
</script>
