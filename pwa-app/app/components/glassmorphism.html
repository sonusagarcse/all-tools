<div class="animate-fade-in">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 bg-purple-500/10 rounded-2xl flex items-center justify-center text-purple-500 border border-purple-500/20">
            <i data-lucide="sparkles" class="w-6 h-6"></i>
        </div>
        <div>
            <h2 class="text-2xl font-black text-slate-900 dark:text-white">Glassmorphism</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest font-bold">UI Design Tool</p>
        </div>
    </div>

    <div class="space-y-6">
        <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm space-y-6">
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Transparency</label>
                    <span id="pwa-glass-val-trans" class="text-xs font-bold text-purple-500">0.2</span>
                </div>
                <input type="range" id="pwa-glass-trans" min="0" max="1" step="0.05" value="0.2" class="w-full h-1.5 bg-slate-100 dark:bg-gray-800 rounded-lg appearance-none cursor-pointer accent-purple-600">
            </div>

            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Blur</label>
                    <span id="pwa-glass-val-blur" class="text-xs font-bold text-purple-500">10px</span>
                </div>
                <input type="range" id="pwa-glass-blur" min="0" max="40" step="1" value="10" class="w-full h-1.5 bg-slate-100 dark:bg-gray-800 rounded-lg appearance-none cursor-pointer accent-purple-600">
            </div>

            <input type="color" id="pwa-glass-color" value="#ffffff" class="w-full h-10 rounded-xl border-none cursor-pointer bg-transparent">
        </div>

        <div id="pwa-glass-bg" class="w-full aspect-square rounded-[2rem] relative flex items-center justify-center overflow-hidden shadow-xl" style="background: linear-gradient(45deg, #6366f1, #ec4899);">
            <div class="absolute w-24 h-24 bg-yellow-400 rounded-full blur-xl animate-bounce"></div>
            <div id="pwa-glass-element" class="w-3/4 h-1/2 rounded-3xl relative z-10 flex items-center justify-center p-6 text-center shadow-2xl">
                <p class="text-sm font-bold">Glass Effect</p>
            </div>
        </div>

        <div class="bg-slate-900 rounded-2xl p-5 shadow-xl relative">
            <div class="flex items-center justify-between mb-3">
                <span class="text-[9px] font-black uppercase tracking-widest text-purple-400">CSS Code</span>
                <button onclick="pwaCopyGlass()" class="text-white hover:text-purple-400">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                </button>
            </div>
            <pre id="pwa-glass-code" class="text-[10px] text-white font-mono whitespace-pre-wrap"></pre>
        </div>
    </div>

    <script>
        (function() {
            const trans = document.getElementById('pwa-glass-trans');
            const blur = document.getElementById('pwa-glass-blur');
            const color = document.getElementById('pwa-glass-color');
            const element = document.getElementById('pwa-glass-element');
            const code = document.getElementById('pwa-glass-code');

            function update() {
                const t = trans.value;
                const b = blur.value;
                const c = color.value;
                const r = parseInt(c.slice(1, 3), 16);
                const g = parseInt(c.slice(3, 5), 16);
                const bl = parseInt(c.slice(5, 7), 16);

                const rgba = `rgba(${r}, ${g}, ${bl}, ${t})`;
                const styles = `background: ${rgba};\nbackdrop-filter: blur(${b}px);\nborder: 1px solid rgba(255,255,255,0.1);`;

                element.style.background = rgba;
                element.style.backdropFilter = `blur(${b}px)`;
                element.style.webkitBackdropFilter = `blur(${b}px)`;
                element.style.border = '1px solid rgba(255,255,255,0.1)';
                
                document.getElementById('pwa-glass-val-trans').textContent = t;
                document.getElementById('pwa-glass-val-blur').textContent = b + 'px';
                code.textContent = styles;
            }

            [trans, blur, color].forEach(el => el.addEventListener('input', update));
            update();

            window.pwaCopyGlass = function() {
                navigator.clipboard.writeText(code.textContent);
            };
        })();
    </script>
</div>
