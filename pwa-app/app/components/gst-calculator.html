<div class="animate-fade-in">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500 border border-emerald-500/20">
            <i data-lucide="calculator" class="w-6 h-6"></i>
        </div>
        <div>
            <h2 class="text-2xl font-black text-slate-900 dark:text-white">GST Calculator</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest font-bold">Financial Utilities</p>
        </div>
    </div>

    <div class="space-y-6">
        <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Amount</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 font-bold">₹</div>
                        <input type="number" id="pwa-gst-amount" placeholder="0.00" class="w-full pl-10 pr-4 py-4 bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-emerald-500 rounded-2xl text-slate-900 dark:text-white font-bold transition-all outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">GST Rate (%)</label>
                    <select id="pwa-gst-rate" class="w-full px-4 py-4 bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-emerald-500 rounded-2xl text-slate-900 dark:text-white font-bold transition-all outline-none appearance-none">
                        <option value="5">5%</option>
                        <option value="12">12%</option>
                        <option value="18" selected>18%</option>
                        <option value="28">28%</option>
                    </select>
                </div>

                <div class="flex p-1 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700">
                    <button onclick="pwaSetGstType('add')" id="pwa-gst-add" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-emerald-500 text-white shadow-lg">Add GST</button>
                    <button onclick="pwaSetGstType('remove')" id="pwa-gst-remove" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 dark:text-slate-400">Remove GST</button>
                </div>
            </div>
        </div>

        <div class="bg-emerald-600 rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10 space-y-6">
                <div class="flex justify-between border-b border-white/10 pb-4">
                    <span class="text-[10px] font-black uppercase tracking-widest opacity-60">Net Amount</span>
                    <span class="font-bold">₹<span id="pwa-res-net">0.00</span></span>
                </div>
                <div class="flex justify-between border-b border-white/10 pb-4">
                    <span class="text-[10px] font-black uppercase tracking-widest opacity-60">Tax Amount</span>
                    <span class="font-bold">₹<span id="pwa-res-tax">0.00</span></span>
                </div>
                <div class="pt-2">
                    <span class="text-[10px] font-black uppercase tracking-widest opacity-60 block mb-1">Total Amount</span>
                    <span class="text-4xl font-black tabular-nums">₹<span id="pwa-res-total">0.00</span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let currentType = 'add';
            const amountInput = document.getElementById('pwa-gst-amount');
            const rateSelect = document.getElementById('pwa-gst-rate');
            const btnAdd = document.getElementById('pwa-gst-add');
            const btnRemove = document.getElementById('pwa-gst-remove');

            window.pwaSetGstType = function(type) {
                currentType = type;
                if (type === 'add') {
                    btnAdd.className = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-emerald-500 text-white shadow-lg";
                    btnRemove.className = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 dark:text-slate-400";
                } else {
                    btnRemove.className = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-emerald-500 text-white shadow-lg";
                    btnAdd.className = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 dark:text-slate-400";
                }
                pwaCalculateGst();
            };

            function pwaCalculateGst() {
                const amount = parseFloat(amountInput.value) || 0;
                const rate = parseFloat(rateSelect.value);
                let net, tax, total;

                if (currentType === 'add') {
                    net = amount;
                    tax = (amount * rate) / 100;
                    total = amount + tax;
                } else {
                    total = amount;
                    net = amount / (1 + (rate / 100));
                    tax = amount - net;
                }

                document.getElementById('pwa-res-net').textContent = net.toFixed(2);
                document.getElementById('pwa-res-tax').textContent = tax.toFixed(2);
                document.getElementById('pwa-res-total').textContent = total.toFixed(2);
            }

            amountInput.addEventListener('input', pwaCalculateGst);
            rateSelect.addEventListener('change', pwaCalculateGst);
        })();
    </script>
</div>
