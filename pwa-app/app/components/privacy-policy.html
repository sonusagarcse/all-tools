<div class="animate-fade-in">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 border border-blue-500/20">
            <i data-lucide="file-text" class="w-6 h-6"></i>
        </div>
        <div>
            <h2 class="text-2xl font-black text-slate-900 dark:text-white">Legal Generator</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest font-bold">Business Tools</p>
        </div>
    </div>

    <div class="space-y-6">
        <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm space-y-4">
            <input type="text" id="pwa-pp-name" placeholder="Website Name" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl text-sm font-bold outline-none">
            <input type="url" id="pwa-pp-url" placeholder="Website URL" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl text-sm font-bold outline-none">
            <input type="email" id="pwa-pp-email" placeholder="Contact Email" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl text-sm font-bold outline-none">
            <button onclick="pwaGeneratePP()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg active:scale-95 transition-transform">Generate Policy</button>
        </div>

        <div id="pwa-pp-result-container" class="hidden space-y-4 animate-fade-in">
            <div class="bg-slate-900 rounded-2xl p-5 shadow-xl relative">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-[9px] font-black uppercase tracking-widest text-blue-400">Generated Policy</span>
                    <button onclick="pwaCopyPP()" class="text-white">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
                <div id="pwa-pp-output" class="text-[10px] text-slate-300 font-mono whitespace-pre-wrap max-h-[300px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            window.pwaGeneratePP = function() {
                const name = document.getElementById('pwa-pp-name').value || '[Site Name]';
                const url = document.getElementById('pwa-pp-url').value || '[Site URL]';
                const email = document.getElementById('pwa-pp-email').value || '[Email]';

                const policy = `Privacy Policy for ${name}\n\nAt ${name}, accessible from ${url}, one of our main priorities is the privacy of our visitors. This Privacy Policy document contains types of information that is collected and recorded by ${name} and how we use it.\n\nIf you have additional questions, contact us at ${email}.\n\nLog Files: ${name} follows a standard procedure of using log files. These files log visitors when they visit websites.`;
                
                document.getElementById('pwa-pp-output').textContent = policy;
                document.getElementById('pwa-pp-result-container').classList.remove('hidden');
                lucide.createIcons();
            };

            window.pwaCopyPP = function() {
                const text = document.getElementById('pwa-pp-output').textContent;
                navigator.clipboard.writeText(text);
            };
        })();
    </script>
</div>
