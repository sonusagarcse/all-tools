<div class="pb-6 animate-in slide-in-from-bottom-4 fade-in duration-300">
    <!-- Header -->
    <div class="mb-6 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">Hindi Typing</h1>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">English to Hindi transliteration</p>
        </div>
        <button onclick="navigate('all-tools')" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Main Editor -->
    <div class="bg-white dark:bg-slate-900 p-4 rounded-[32px] border border-slate-100 dark:border-slate-800 shadow-sm mb-6 relative group">
        <textarea id="pwa-hindi-input" class="w-full h-64 bg-transparent border-none text-slate-900 dark:text-white text-lg p-4 focus:ring-0 placeholder:text-slate-300 dark:placeholder:text-slate-700 resize-none" placeholder="Type in English (e.g. namaste) and hit space..."></textarea>
        
        <!-- Floating Actions -->
        <div class="absolute bottom-4 right-4 flex gap-2">
            <button id="pwa-hindi-copy" class="p-3 bg-indigo-600 text-white rounded-2xl shadow-lg active:scale-95 transition-transform flex items-center gap-2 text-xs font-bold">
                <i data-lucide="copy" class="w-4 h-4"></i> Copy
            </button>
            <button onclick="document.getElementById('pwa-hindi-input').value = ''" class="p-3 bg-slate-100 dark:bg-slate-800 text-slate-400 rounded-2xl active:scale-95 transition-transform">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- Instructions -->
    <div class="p-6 bg-amber-50 dark:bg-amber-900/10 rounded-3xl border border-amber-100 dark:border-amber-900/20 flex items-start gap-4">
        <div class="w-8 h-8 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 flex items-center justify-center shrink-0">
            <i data-lucide="info" class="w-4 h-4"></i>
        </div>
        <div>
            <h4 class="text-xs font-black text-amber-700 dark:text-amber-400 uppercase tracking-widest mb-1">How it works</h4>
            <p class="text-[10px] text-amber-600/80 dark:text-amber-400/60 leading-relaxed font-medium">
                Type phonetic English words and press <span class="bg-amber-100 dark:bg-amber-900/50 px-1 rounded">Space</span> to convert.
                Example: "kaise ho" → "कैसे हो".
            </p>
        </div>
    </div>
</div>

<script>
(function() {
    const textarea = document.getElementById('pwa-hindi-input');
    
    // Transliteration logic
    textarea.addEventListener('keyup', async (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
             await transliterateLastWord();
        }
    });

    async function transliterateLastWord() {
        const text = textarea.value;
        const selectionStart = textarea.selectionStart;
        
        const textBeforeCursor = text.substring(0, selectionStart);
        const match = textBeforeCursor.match(/([a-zA-Z]+)(\s+)$/);
        
        if (match) {
            const word = match[1];
            const spacing = match[2];
            
            try {
                const response = await fetch(`https://inputtools.google.com/request?text=${word}&itc=hi-t-i0-und&num=1&cp=0&cs=1&ie=utf-8&oe=utf-8&app=demopage`);
                const data = await response.json();
                
                if (data[0] === 'SUCCESS') {
                    const hindiWord = data[1][0][1][0];
                    const newText = text.substring(0, selectionStart - word.length - spacing.length) + hindiWord + spacing + text.substring(selectionStart);
                    textarea.value = newText;
                    const newCursorPos = selectionStart - word.length + hindiWord.length;
                    textarea.setSelectionRange(newCursorPos, newCursorPos);
                }
            } catch (err) {
                console.error("Transliteration failed:", err);
            }
        }
    }

    // Copy logic
    document.getElementById('pwa-hindi-copy').addEventListener('click', () => {
        textarea.select();
        navigator.clipboard.writeText(textarea.value);
        
        // Visual feedback
        const btn = document.getElementById('pwa-hindi-copy');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Copied!';
        btn.classList.replace('bg-indigo-600', 'bg-emerald-600');
        setTimeout(() => {
            btn.innerHTML = originalHtml;
            btn.classList.replace('bg-emerald-600', 'bg-indigo-600');
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }, 2000);
    });

    if (typeof lucide !== 'undefined') lucide.createIcons();
})();
</script>
