<div class="pb-6 animate-in slide-in-from-bottom-4 fade-in duration-300">
    <div class="mb-6">
        <h1 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">Account</h1>
    </div>

    <!-- Auth UI Container -->
    <div id="profile-container">
        <!-- Will be populated by JS -->
    </div>
</div>

<script>
function renderProfile() {
    const container = document.getElementById('profile-container');
    const state = window.appState;

    if (state.isLoggedIn) {
        container.innerHTML = `
            <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm text-center transition-colors">
                <div class="w-20 h-20 bg-indigo-50 dark:bg-indigo-900/30 rounded-full mx-auto flex items-center justify-center mb-4 border border-indigo-100 dark:border-indigo-800">
                    <i data-lucide="user" class="w-10 h-10 text-indigo-600 dark:text-indigo-400"></i>
                </div>
                <h3 class="font-black text-slate-900 dark:text-white text-lg">${state.user.email}</h3>
                <p class="text-xs text-slate-500 dark:text-slate-400 mb-8">Professional Account Active</p>
                
                <div class="space-y-3">
                    <button onclick="handleLogout()" class="w-full py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 text-red-600 dark:text-red-400 font-bold text-sm active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Sign Out
                    </button>
                    <p class="text-[10px] text-slate-400 dark:text-slate-600 font-bold uppercase tracking-widest mt-4">Synced with cloud</p>
                </div>
            </div>
        `;
    } else {
        container.innerHTML = `
            <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm transition-colors">
                <div class="w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center mb-6">
                    <i data-lucide="shield-check" class="w-8 h-8 text-indigo-600 dark:text-indigo-400"></i>
                </div>
                <h3 class="font-black text-slate-900 dark:text-white text-xl mb-2">Secure Access</h3>
                <p class="text-xs text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">Login to sync your data across devices and unlock professional features.</p>
                
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" placeholder="Email Address" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 text-sm dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <input type="password" placeholder="Password" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 text-sm dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <button type="submit" class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-black text-sm shadow-lg shadow-indigo-500/20 active:scale-95 transition-transform mt-2">Sign In</button>
                </form>
                <div id="auth-error" class="hidden mt-4 text-xs font-bold text-red-500 p-3 bg-red-50 dark:bg-red-900/20 rounded-xl"></div>
            </div>
        `;
    }
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

async function handleLogin(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const origText = btn.innerText;
    btn.innerText = 'Verifying...';
    btn.disabled = true;

    try {
        const formData = new FormData();
        formData.append('action', 'login');
        formData.append('email', e.target[0].value);
        formData.append('password', e.target[1].value);

        const res = await fetch('/pwa-app/api/v1/auth.php', { method: 'POST', body: formData });
        const data = await res.json();
        
        if(data.success) {
            localStorage.setItem('bt_logged_in', 'true');
            localStorage.setItem('bt_user', JSON.stringify({ email: data.user.email }));
            window.appState.isLoggedIn = true;
            window.appState.user = { email: data.user.email };
            renderProfile();
            // Redirect to dashboard after login
            if (typeof window.navigate === 'function') {
                setTimeout(() => window.navigate('dashboard'), 500);
            }
        } else {
            const errDiv = document.getElementById('auth-error');
            errDiv.innerText = data.message || 'Login failed';
            errDiv.classList.remove('hidden');
            setTimeout(() => errDiv.classList.add('hidden'), 3000);
        }
    } catch (err) {
        alert('Connectivity Error. Check network.');
    } finally {
        if(btn) { btn.innerText = origText; btn.disabled = false; }
    }
}

async function handleLogout() {
    if(confirm('Are you sure you want to sign out?')) {
        const formData = new FormData();
        formData.append('action', 'logout');
        await fetch('/pwa-app/api/v1/auth.php', { method: 'POST', body: formData });
        
        localStorage.removeItem('bt_logged_in');
        localStorage.removeItem('bt_user');
        window.appState.isLoggedIn = false;
        renderProfile();
    }
}

// Init
renderProfile();
</script>
