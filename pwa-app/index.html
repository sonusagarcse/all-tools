<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="BulkTools - Professional daily utilities in your pocket. Fast, secure, and offline capable.">
    <!-- PWA Icons - versioned to force fresh icon on reinstall -->
    <link rel="apple-touch-icon" href="app/assets/icon-192.png?v=1.3.0">
    <link rel="icon" type="image/png" sizes="192x192" href="app/assets/icon-192.png?v=1.3.0">
    <link rel="icon" type="image/png" sizes="512x512" href="app/assets/icon-512.png?v=1.3.0">
    <!-- Manifest: no static ?v= - dynamically versioned in bootApp() -->
    <link rel="manifest" href="manifest.json?v=1.3.0" id="manifest-link">
    <title>BulkTools Pro</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- Tailwind via CDN for standalone simplicity in dev -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script>
        // Tailwind Configuration for Dark Mode
        window.tailwindConfig = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                        }
                    }
                }
            }
        };

        // Immediate Theme Check to prevent flash
        if (localStorage.getItem('bt_theme') === 'dark' || (!('bt_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <!-- Custom PWA Styles -->
    <link rel="stylesheet" id="main-styles" href="app/assets/css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 pb-20 select-none transition-colors duration-300">
    
    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-indigo-600 z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-2xl mb-6 shadow-indigo-900/50">
            <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight" style="font-family: 'Space Grotesk', sans-serif;">BulkTools</h1>
        <div class="absolute bottom-12 flex flex-col items-center">
            <div class="w-6 h-6 border-2 border-indigo-400 border-t-white rounded-full animate-spin"></div>
        </div>
    </div>

    <!-- Top App Bar Fixed -->
    <header class="fixed top-0 left-0 right-0 h-14 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 z-40 flex items-center px-4 justify-between transition-transform duration-300 shadow-sm" id="top-nav">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i data-lucide="layers" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-cyan-500 tracking-tight" style="font-family: 'Space Grotesk', sans-serif;">
                BulkTools
            </span>
        </div>
        <div class="flex items-center gap-3">
            <button class="text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300">
                <i data-lucide="search" class="w-5 h-5"></i>
            </button>
            <button class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400 relative" onclick="navigate('profile')">
                <i data-lucide="user" class="w-4 h-4"></i>
                <div class="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></div>
            </button>
        </div>
    </header>

    <!-- Dynamic Content Area -->
    <main id="app-content" class="pt-16 pb-6 px-4 max-w-lg mx-auto w-full transition-opacity duration-200">
        <!-- Loader -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 h-16 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex justify-around items-center z-50 safe-area-bottom shadow-[0_-4px_10px_rgba(0,0,0,0.02)] transition-colors">
        <button onclick="navigate('home')" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-indigo-600 active-nav" data-target="home">
            <i data-lucide="home" class="w-5 h-5 mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </button>
        <button onclick="navigate('all-tools')" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-slate-400 dark:text-slate-500" data-target="all-tools">
            <i data-lucide="layout-grid" class="w-5 h-5 mb-1"></i>
            <span class="text-[10px] font-medium">Tools</span>
        </button>
        <button onclick="navigate('profile')" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-slate-400 dark:text-slate-500" data-target="profile">
            <i data-lucide="user" class="w-5 h-5 mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </button>
        <button onclick="navigate('settings')" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-slate-400 dark:text-slate-500" data-target="settings">
            <i data-lucide="settings-2" class="w-5 h-5 mb-1"></i>
            <span class="text-[10px] font-medium">Settings</span>
        </button>
    </nav>

    <!-- Update UI -->
    <div id="update-snackbar" class="fixed bottom-24 left-4 right-4 md:left-auto md:right-6 md:w-80 bg-slate-900 dark:bg-slate-800 border border-slate-700 text-white p-5 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] z-[10000] transform translate-y-40 opacity-0 transition-all duration-500 flex flex-col gap-4 pointer-events-none">
        <div class="flex items-start gap-4">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0">
                <i data-lucide="refresh-cw" class="w-5 h-5 animate-spin-slow"></i>
            </div>
            <div>
                <h4 class="font-bold text-sm">Update Available 🚀</h4>
                <p id="release-notes" class="text-xs text-slate-400 mt-1">A new version of BulkTools is ready.</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="update-confirm" class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-xl transition-colors active:scale-95">Update Now</button>
            <button id="update-cancel" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded-xl transition-colors">Later</button>
        </div>
    </div>

    <!-- Core App Logic -->
    <script src="app/app.js"></script>
    <script>
        (function() {
            'use strict';
            let swRegistration = null;

            // ── STEP 1: Fetch version.json fresh every time (no cache) ──────────────
            async function bootApp() {
                let data = { version: '1.3.0', release_notes: 'Latest version.' };
                try {
                    const res = await fetch('./version.json?t=' + Date.now(), { cache: 'no-store' });
                    data = await res.json();
                } catch (e) {
                    console.warn('[Boot] Offline - using last known version.');
                }

                window.BT_VERSION = data.version;
                localStorage.setItem('bt_app_version', data.version);

                // Version-bust CSS and manifest link
                const style = document.getElementById('main-styles');
                if (style) style.href = 'app/assets/css/style.css?v=' + data.version;

                const manifestEl = document.getElementById('manifest-link');
                if (manifestEl) manifestEl.href = 'manifest.json?v=' + data.version;

                // ── STEP 2: Register SW with updateViaCache:'none' ──────────────────
                // This is THE critical fix: it tells the browser NEVER to serve
                // a cached sw.js from HTTP cache, so updates are always detected.
                if ('serviceWorker' in navigator) {
                    try {
                        swRegistration = await navigator.serviceWorker.register('./sw.js', {
                            updateViaCache: 'none'  // ← KEY: prevents browser caching sw.js
                        });
                        console.log('[SW] Registered. Scope:', swRegistration.scope);

                        // Force an immediate update check
                        await swRegistration.update();

                        // Handle any waiting worker
                        if (swRegistration.waiting) {
                            showUpdatePrompt(swRegistration, data);
                        }

                        // Handle new worker being installed
                        swRegistration.addEventListener('updatefound', () => {
                            const newWorker = swRegistration.installing;
                            if (!newWorker) return;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // A new version installed but old SW still in control
                                    showUpdatePrompt(swRegistration, data);
                                }
                            });
                        });

                        // Periodic background update check (every 30 minutes)
                        setInterval(() => swRegistration.update(), 30 * 60 * 1000);

                    } catch (err) {
                        console.error('[SW] Registration failed:', err);
                    }
                }
            }

            // ── STEP 3: Listen for SW_ACTIVATED from new service worker ─────────────
            // The new SW sends this message after activate + clients.claim()
            // This is the most reliable way to know a new version has taken over.
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.addEventListener('message', (event) => {
                    if (event.data && event.data.type === 'SW_ACTIVATED') {
                        console.log('[SW] New version activated:', event.data.version);
                        // Auto-reload to serve fresh content from new SW
                        window.location.reload();
                    }
                });

                // Fallback: also reload on controllerchange (covers manual SKIP_WAITING)
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    window.location.reload();
                });
            }

            // ── STEP 4: Update prompt UI ─────────────────────────────────────────────
            function showUpdatePrompt(reg, data) {
                const snackbar = document.getElementById('update-snackbar');
                const releaseNotes = document.getElementById('release-notes');
                if (!snackbar) return;

                if (data && data.release_notes) releaseNotes.innerText = data.release_notes;

                snackbar.classList.remove('translate-y-40', 'opacity-0', 'pointer-events-none');
                snackbar.classList.add('translate-y-0', 'opacity-100');
                if (typeof lucide !== 'undefined') lucide.createIcons();

                document.getElementById('update-confirm').onclick = () => {
                    const worker = reg.waiting;
                    if (worker) {
                        // Tell the waiting SW to skip waiting and take control
                        worker.postMessage({ type: 'SKIP_WAITING' });
                        // controllerchange listener above will reload automatically
                    }
                };

                document.getElementById('update-cancel').onclick = () => {
                    snackbar.classList.remove('translate-y-0', 'opacity-100');
                    snackbar.classList.add('translate-y-40', 'opacity-0', 'pointer-events-none');
                };
            }

            // ── START ────────────────────────────────────────────────────────────────
            bootApp();

            window.addEventListener('load', () => {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            });
        })();
    </script>
</body>
</html>
