<!DOCTYPE html>

    <meta charset="UTF-8">

    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="BulkTools PWA">
    <link rel="manifest" href="manifest.json?v=1.0.8">
    <title>BulkTools Pro</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- Tailwind via CDN for standalone simplicity in dev -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script>
        // Tailwind Configuration for Dark Mode
        window.tailwindConfig = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                        }
                    }
                }
            }
        };

        // Immediate Theme Check to prevent flash
        if (localStorage.getItem('bt_theme') === 'dark' || (!('bt_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <!-- Custom PWA Styles -->
    <link rel="stylesheet" href="app/assets/css/style.css">
</head>

        <div class="flex items-center gap-2">

    <!-- Update Notification Snackbar -->
    <div id="update-snackbar" class="fixed bottom-24 left-4 right-4 md:left-auto md:right-6 md:w-80 bg-slate-900 dark:bg-slate-800 border border-slate-700 text-white p-5 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] z-[10000] transform translate-y-40 opacity-0 transition-all duration-500 flex flex-col gap-4 pointer-events-none">

            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0">
                <i data-lucide="refresh-cw" class="w-5 h-5 animate-spin-slow"></i>
            </div>

                <h4 class="font-bold text-sm">Update Available 🚀</h4>

                Update Now
            </button>

    <!-- Global App Scripts -->
    <script src="app/app.js"></script>
    <script>
        // Init Icons safely
        window.onload = () => {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        };

        // --- PWA UPDATE SYSTEM ---
        let newWorker;
        const snackbar = document.getElementById('update-snackbar');

        function showUpdateSnackbar() {
            snackbar.classList.remove('translate-y-40', 'opacity-0', 'pointer-events-none');
            snackbar.classList.add('translate-y-0', 'opacity-100');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function hideUpdateSnackbar() {
            snackbar.classList.remove('translate-y-0', 'opacity-100');
            snackbar.classList.add('translate-y-40', 'opacity-0', 'pointer-events-none');
        }

        document.getElementById('update-confirm').addEventListener('click', () => {
            if (newWorker) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
                hideUpdateSnackbar();
            }
        });

        document.getElementById('update-cancel').addEventListener('click', hideUpdateSnackbar);

        // Service Worker Registration with Update Detection
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=' + Date.now()).then(reg => {
                    console.log('[App] SW registered');

                    // 1. Detect if an update is already waiting (e.g. from previous session)
                    if (reg.waiting) {
                        newWorker = reg.waiting;
                        showUpdateSnackbar();
                    }

                    // 2. Listen for future updates
                    reg.addEventListener('updatefound', () => {
                        newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New worker is installed and ready to be activated
                                showUpdateSnackbar();
                            }
                        });
                    });
                });

                // 3. Reload when new worker takes control
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    window.location.reload();
                });
            });
        }

        // 4. Background Version Checking (Optional but recommended for power users)
        async function checkVersion() {
            try {
                const res = await fetch('./version.json?t=' + Date.now());
                const data = await res.json();
                const currentVersion = localStorage.getItem('bt_app_version');

                if (currentVersion && data.version !== currentVersion) {
                    console.log('[App] Version mismatch detected:', data.version);
                    if (data.critical) {
                        // Use modern prompt for critical updates
                        // We trigger SW update check which will then fire 'updatefound'
                        if (navigator.serviceWorker.controller) {
                            const reg = await navigator.serviceWorker.getRegistration();
                            if (reg) reg.update();
                        }
                    }
                }
                localStorage.setItem('bt_app_version', data.version);
            } catch (err) {
                console.log('Version check failed');
            }
        }

        // Run initial check and then every 30 mins
        checkVersion();
        setInterval(checkVersion, 1000 * 60 * 30);
    </script>
